[package]
name = "rustuse"
description = "Unified facade crate for the published RustUse sets and child crates"
publish = true
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
readme = "README.md"
documentation = "https://docs.rs/rustuse"
repository = "https://github.com/RustUse/rustuse"
homepage = "https://rustuse.org"
rust-version = "1.95.0"
keywords = ["rustuse", "facade", "math", "rust", "prelude"]
categories = ["mathematics", "development-tools", "rust-patterns"]

[package.metadata.docs.rs]
all-features = true

[features]
default = ["full"]
full = ["math", "rust"]
math = [
    "use-algebra",
    "use-calculus",
    "use-catalan",
    "use-combinatorics",
    "use-complex",
    "use-geometry",
    "use-integer",
    "use-linear",
    "use-logic",
    "use-math",
    "use-number",
    "use-probability",
    "use-rational",
    "use-real",
    "use-series",
    "use-set",
    "use-statistics",
    "use-trigonometry",
]
rust = ["use-crate", "use-rust", "use-version"]

[dependencies]
use-algebra = { version = "0.0.1", path = "../use-math/crates/use-algebra", optional = true }
use-calculus = { version = "0.0.1", path = "../use-math/crates/use-calculus", optional = true }
use-catalan = { version = "0.0.1", path = "../use-math/crates/use-catalan", optional = true }
use-combinatorics = { version = "0.0.1", path = "../use-math/crates/use-combinatorics", optional = true }
use-complex = { version = "0.0.1", path = "../use-math/crates/use-complex", optional = true }
use-geometry = { version = "0.0.1", path = "../use-math/crates/use-geometry", optional = true }
use-integer = { version = "0.0.1", path = "../use-math/crates/use-integer", optional = true }
use-linear = { version = "0.0.1", path = "../use-math/crates/use-linear", optional = true }
use-logic = { version = "0.0.1", path = "../use-math/crates/use-logic", optional = true }
use-math = { version = "0.0.1", path = "../use-math/crates/use-math", optional = true }
use-number = { version = "0.0.1", path = "../use-math/crates/use-number", optional = true }
use-probability = { version = "0.0.1", path = "../use-math/crates/use-probability", optional = true }
use-rational = { version = "0.0.1", path = "../use-math/crates/use-rational", optional = true }
use-real = { version = "0.0.1", path = "../use-math/crates/use-real", optional = true }
use-series = { version = "0.0.1", path = "../use-math/crates/use-series", optional = true }
use-set = { version = "0.0.1", path = "../use-math/crates/use-set", optional = true }
use-statistics = { version = "0.0.1", path = "../use-math/crates/use-statistics", optional = true }
use-trigonometry = { version = "0.0.1", path = "../use-math/crates/use-trigonometry", optional = true }
use-crate = { version = "0.1.0", path = "../use-rust/crates/use-crate", optional = true }
use-rust = { version = "0.1.0", path = "../use-rust/crates/use-rust", optional = true }
use-version = { version = "0.1.0", path = "../use-rust/crates/use-version", optional = true }