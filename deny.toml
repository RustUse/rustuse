[graph]
all-features = true

[advisories]
# Vulnerability advisories are denied by default in cargo-deny 0.19+.
# Keep unmaintained advisories non-blocking to avoid noisy CI failures from
# transitive ecosystem status changes, but fail on unsound and yanked crates.
ignore = []
unmaintained = "none"
unsound = "all"
yanked = "deny"

[licenses]
confidence-threshold = 0.93
unused-allowed-license = "warn"

allow = ["Apache-2.0", "BSD-2-Clause", "BSD-3-Clause", "ISC", "MIT", "Unicode-3.0"]

[licenses.private]
ignore = true

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
allow-registry = ["https://github.com/rust-lang/crates.io-index", "sparse+https://index.crates.io/"]
unknown-git = "deny"
unknown-registry = "deny"
